name: Traffic Analytics

on:
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 6:00 UTC (9:00 МСК)
  workflow_dispatch:      # Можно запустить вручную

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run traffic script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/traffic.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic.csv report.md
          git diff --staged --quiet || git commit -m "Обновление статистики трафика [skip ci]"
          git push
